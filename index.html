<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Image Slider</title>
</head>
<body>
    <section aria-label="Newest Photos">
        <div class="carousel" data-carousel>
            <button class="carousel-button prev" data-carousel-button="prev">&#8592;</button>
            <button class="carousel-button next" data-carousel-button="next">&#8594;</button>
          <ul data-slides>
            <li class="slide" data-active>
                <img src="./assets/finu1.png" alt="Photo of my ginger cat Alfie Image #1">
            </li>
            <li class="slide">
                <img src="./assets/arya.png" alt="Photo of my tabby cat Arya Image #2">
            </li>
            <li class="slide">
                <img src="./assets/aryafinu.png" alt="Photo of my ginger cat Alfie and tabby cat Arya Image #3">
            </li>
            <li class="slide" data-active>
                <img src="./assets/finu2.png" alt="Photo of my ginger cat Alfie Image #4">
            </li>
          </ul>
        </div>
    </section>
</body>
</html>
